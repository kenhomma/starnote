<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>✦ Constellation</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#00000a;--s1:#0d0d1a;--s2:#0a0a18;--b1:#1c1c30;--b2:#242438;
  --text:#e0e0f0;--dim:#606090;--accent:#b8a0ff;--ok:#4ade80;--danger:#f87171;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:'Noto Sans JP',sans-serif;color:var(--text);touch-action:none;user-select:none}
#hdr{position:fixed;top:0;left:0;right:0;height:50px;z-index:200;
  background:rgba(0,0,10,.92);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--b1);
  display:flex;align-items:center;padding:0 14px;gap:8px}
.logo{font-family:'Space Mono',monospace;font-size:13px;color:var(--accent);flex:1;letter-spacing:.12em}
.hbtn{background:none;border:1px solid var(--b2);border-radius:6px;
  color:var(--dim);font-family:'Space Mono',monospace;font-size:10px;
  padding:5px 10px;cursor:pointer;transition:all .15s;white-space:nowrap}
.hbtn:hover{border-color:var(--accent);color:var(--accent)}
.hbtn.danger:hover{border-color:var(--danger);color:var(--danger)}
#cvs{position:fixed;top:50px;left:0;right:0;bottom:0}
#cvs svg{width:100%;height:100%}
/* sidebar */
#sb{position:fixed;top:50px;right:0;bottom:0;width:300px;
  background:#0f0f1e;border-left:1px solid var(--b1);
  display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .35s cubic-bezier(.2,.9,.3,1);z-index:150}
#sb.open{transform:none}
#sb-hd{padding:13px 14px;border-bottom:1px solid var(--b1);
  display:flex;align-items:center;gap:8px}
.sdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
#sb-ttl{flex:1;background:none;border:none;outline:none;
  font-size:15px;font-weight:700;color:#f0f0ff;font-family:'Noto Sans JP',sans-serif}
#sb-x{background:none;border:none;color:var(--dim);font-size:22px;cursor:pointer;padding:2px 5px}
#sb-x:hover{color:var(--text)}
#sb-bd{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:14px}
#sb-bd::-webkit-scrollbar{width:3px}
#sb-bd::-webkit-scrollbar-thumb{background:var(--b2)}
.sf{display:flex;flex-direction:column;gap:6px}
.sf label{font-size:10px;letter-spacing:.1em;color:#8888bb;font-weight:700;text-transform:uppercase}
#sb-body{width:100%;min-height:100px;background:var(--s2);border:1px solid var(--b1);border-radius:7px;
  color:#dde0f6;font-size:13px;line-height:1.8;padding:9px;resize:vertical;outline:none;
  font-family:'Noto Sans JP',sans-serif}
#sb-body:focus{border-color:var(--accent)}
.type-btns{display:flex;gap:5px;flex-wrap:wrap}
.tbtn{background:none;border:1px solid var(--b2);border-radius:6px;
  color:var(--dim);font-size:11px;padding:5px 9px;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;transition:all .15s;flex:1;text-align:center;white-space:nowrap}
.tbtn.on{border-color:var(--accent);color:var(--accent);background:rgba(184,160,255,.1)}
#sb-done{width:100%;background:none;border:1px solid var(--b2);border-radius:6px;
  color:var(--dim);font-size:11px;padding:7px;cursor:pointer;
  font-family:'Space Mono',monospace;transition:all .15s;text-align:center}
#sb-done.done{border-color:var(--ok);color:var(--ok)}
.cprow{display:flex;gap:6px;flex-wrap:wrap}
.cp{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.cp.on{border-color:#fff;transform:scale(1.2)}
.remind-daterow{display:flex;gap:5px}
.rdtinput{flex:1;background:var(--s2);border:1px solid var(--b1);border-radius:6px;
  color:var(--text);font-size:11px;padding:5px 7px;outline:none;font-family:'Noto Sans JP',sans-serif;min-width:0}
.rdtinput:focus{border-color:var(--accent)}
.rbtn{background:none;border:1px solid var(--b2);border-radius:6px;
  color:var(--dim);font-size:10px;padding:5px 8px;cursor:pointer;
  font-family:'Space Mono',monospace;transition:all .15s}
.rbtn:hover{border-color:var(--accent);color:var(--accent)}
#rlist{display:flex;flex-direction:column;gap:3px}
.rtag{display:flex;align-items:center;justify-content:space-between;
  background:var(--s2);border:1px solid var(--b1);border-radius:5px;
  padding:4px 8px;font-size:10.5px;color:var(--accent)}
.rtag button{background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px}
.clist{display:flex;flex-direction:column;gap:4px}
.ci{display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--b1);
  border-radius:5px;padding:7px 9px;font-size:11px;cursor:pointer;transition:border-color .15s}
.ci:hover{border-color:var(--accent)}
.ci button{background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;margin-left:auto}
#sb-ft{padding:10px 14px;border-top:1px solid var(--b1);display:flex;gap:6px}
.fact{flex:1;background:none;border:1px solid var(--b2);border-radius:6px;
  color:#8888bb;font-size:10px;padding:7px 4px;cursor:pointer;text-align:center;
  font-family:'Space Mono',monospace;transition:all .15s}
.fact:hover{border-color:var(--accent);color:var(--accent)}
.fact.danger:hover{border-color:var(--danger);color:var(--danger)}
#addpop{position:fixed;z-index:300;display:none;
  background:#0f0f1e;border:1px solid var(--b2);border-radius:10px;
  padding:14px;width:248px;box-shadow:0 10px 40px rgba(0,0,0,.7)}
#addpop input{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:6px;
  color:var(--text);font-size:13px;padding:7px 9px;outline:none;margin-bottom:9px;
  font-family:'Noto Sans JP',sans-serif}
#addpop input:focus{border-color:var(--accent)}
.prow{display:flex;gap:6px}
.pbtn{flex:1;background:none;border:1px solid var(--b2);border-radius:6px;
  color:var(--dim);font-size:10px;padding:7px;cursor:pointer;
  font-family:'Space Mono',monospace;transition:all .15s}
.pbtn.ok{border-color:var(--accent);color:var(--accent)}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(50px);
  background:#0f0f1e;border:1px solid var(--b2);border-radius:7px;
  padding:8px 16px;font-size:11px;color:var(--text);z-index:400;
  transition:transform .25s cubic-bezier(.2,.9,.3,1);pointer-events:none;
  font-family:'Space Mono',monospace;box-shadow:0 4px 20px rgba(0,0,0,.5)}
#toast.up{transform:translateX(-50%) translateY(0)}
.rpulse{animation:rp 2s ease-in-out infinite}
@keyframes rp{0%,100%{opacity:.9}50%{opacity:.2}}
</style>
</head>
<body>
<div id="hdr">
  <div class="logo">✦ Constellation</div>
  <button class="hbtn" onclick="activateAdd()">＋ 追加</button>
  <button class="hbtn" onclick="exportAll()">↓ .md</button>
  <button class="hbtn" onclick="document.getElementById('md-in').click()">↑ 読込</button>
  <button class="hbtn danger" onclick="clearAll()">✕</button>
</div>
<div id="cvs"><svg id="g"></svg></div>
<div id="addpop">
  <input id="add-in" placeholder="タイトルを入力..." maxlength="40" autocomplete="off"/>
  <div class="prow">
    <button class="pbtn" onclick="cancelAdd()">キャンセル</button>
    <button class="pbtn ok" onclick="confirmAdd()">追加 ✦</button>
  </div>
</div>
<div id="sb">
  <div id="sb-hd">
    <div class="sdot" id="sdot"></div>
    <input id="sb-ttl" placeholder="タイトル..."/>
    <button id="sb-x" onclick="closeSB()">×</button>
  </div>
  <div id="sb-bd">
    <div class="sf"><label>メモ</label>
      <textarea id="sb-body" placeholder="メモを入力..."></textarea></div>
    <div class="sf"><label>種別</label>
      <div class="type-btns" id="type-btns">
        <button class="tbtn on" data-type="memo" onclick="setType('memo')">📝 メモ</button>
        <button class="tbtn" data-type="todo" onclick="setType('todo')">☑ Todo</button>
        <button class="tbtn" data-type="idea" onclick="setType('idea')">💡 アイデア</button>
        <button class="tbtn" data-type="goal" onclick="setType('goal')">🎯 目標</button>
        <button class="tbtn" data-type="link" onclick="setType('link')">🔗 リンク</button>
      </div>
      <button id="sb-done" onclick="toggleDone()">完了にする</button>
    </div>
    <div class="sf"><label>カラー</label><div class="cprow" id="cprow"></div></div>
    <div class="sf"><label>🔔 リマインダー</label>
      <div class="remind-daterow">
        <input type="date" id="sb-rdate" class="rdtinput"/>
        <input type="time" id="sb-rtime" class="rdtinput"/>
        <button class="rbtn" onclick="addReminder()">SET</button>
      </div>
      <div id="rlist" style="margin-top:4px"></div>
    </div>
    <div class="sf"><label>🔗 接続</label><div class="clist" id="clist"></div></div>
  </div>
  <div id="sb-ft">
    <button class="fact" onclick="saveSB()">💾 保存</button>
    <button class="fact" onclick="dlNodeMD()">↓ .md</button>
    <button class="fact danger" onclick="delNode()">🗑 削除</button>
  </div>
</div>
<div id="toast"></div>
<input type="file" id="md-in" accept=".md" style="display:none" onchange="onImport(event)">

<script>
/* ════════════════════════════════════════
   CONSTANTS
════════════════════════════════════════ */
const PAL=['#b8a0ff','#7dd3fc','#f9a8d4','#4ade80','#fb923c','#facc15','#94a3b8'];
const TICON={memo:'📝',todo:'☑',idea:'💡',goal:'🎯',link:'🔗'};
const SK='constellation_v1';
const BASE_R=26, MAX_R=62;

/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
let nodes=[], edges=[], selId=null;
let addGxy={x:0,y:0};
let W=0, H=0;
// D3 zoom state
let SVG=null, G=null, ZOOM=null, CZ=d3.zoomIdentity, curScale=1;
// RAF handles
let starRaf=null, floatRaf=null;
// float time
let floatT=0;

/* ════════════════════════════════════════
   PERSIST
════════════════════════════════════════ */
function save(){localStorage.setItem(SK,JSON.stringify({nodes,edges}))}
function load(){
  try{const d=JSON.parse(localStorage.getItem(SK)||'null');if(d){nodes=d.nodes||[];edges=d.edges||[];}}catch(e){}
}

/* ════════════════════════════════════════
   NODE SIZE — 接続数で決まる
════════════════════════════════════════ */
function nodeR(id){
  return Math.min(MAX_R, BASE_R + edges.filter(e=>e.src===id||e.tgt===id).length*8);
}
function hitR(id){ return nodeR(id)+16; }

/* ════════════════════════════════════════
   SCATTER
════════════════════════════════════════ */
function scatterPos(){
  const m=120;
  return {x:m+Math.random()*(W-m*2), y:m+Math.random()*(H-m*2)};
}

/* ════════════════════════════════════════
   STAR FIELD
════════════════════════════════════════ */
let starsG=null;
function buildStars(svg){
  if(starsG) starsG.remove();
  if(starRaf){cancelAnimationFrame(starRaf);starRaf=null;}
  starsG=svg.insert('g',':first-child').attr('pointer-events','none');
  starsG.append('rect').attr('width',W).attr('height',H).attr('fill','#00000a');
  const stars=[];
  for(let i=0;i<180;i++){
    const el=starsG.append('circle')
      .attr('cx',Math.random()*W).attr('cy',Math.random()*H)
      .attr('r',Math.random()*1.4+.15).attr('fill','#fff');
    stars.push({el,base:Math.random()*.38+.05,phase:Math.random()*Math.PI*2,spd:.4+Math.random()*.8});
  }
  let t=0;
  function tick(){
    t+=.012;
    stars.forEach(s=>s.el.attr('opacity',s.base*(.5+.5*Math.sin(t*s.spd+s.phase))));
    starRaf=requestAnimationFrame(tick);
  }
  tick();
  // 流れ星
  setTimeout(function shoot(){
    if(!starsG)return;
    const ang=Math.PI/7+Math.random()*Math.PI/5;
    const sx=Math.random()*W*.8, sy=Math.random()*H*.35;
    const len=60+Math.random()*100, dur=400+Math.random()*350;
    const ex=sx+Math.cos(ang)*len, ey=sy+Math.sin(ang)*len;
    starsG.append('line').attr('x1',sx).attr('y1',sy).attr('x2',sx).attr('y2',sy)
      .attr('stroke','#fff').attr('stroke-width',1.2).attr('stroke-opacity',0).attr('pointer-events','none')
      .transition().duration(dur*.2).attr('stroke-opacity',.85)
      .transition().duration(dur*.6).ease(d3.easeLinear)
        .attr('x1',ex-(ex-sx)*.3).attr('y1',ey-(ey-sy)*.3).attr('x2',ex).attr('y2',ey)
      .transition().duration(dur*.35).attr('stroke-opacity',0).attr('x1',ex).attr('y1',ey).remove();
    setTimeout(shoot,8000+Math.random()*16000);
  },3000+Math.random()*5000);
}

/* ════════════════════════════════════════
   GLOW / PROPAGATE
════════════════════════════════════════ */
function glowNode(id,intensity,delay){
  intensity=intensity||.85; delay=delay||0;
  setTimeout(()=>{
    const r=nodeR(id), dur=170+intensity*160;
    d3.selectAll('g.nd').filter(d=>d.id===id).select('.core')
      .interrupt()
      .transition().duration(dur).ease(d3.easeSinInOut).attr('r',r*(1+intensity*.45)).attr('fill-opacity',.95)
      .transition().duration(dur*2.5).ease(d3.easeSinInOut).attr('r',r).attr('fill-opacity',.8);
  },delay);
}
function pulseEdge(eid,delay){
  setTimeout(()=>{
    const e=edges.find(x=>x.id===eid); if(!e)return;
    const s=nodes.find(n=>n.id===e.src), t=nodes.find(n=>n.id===e.tgt); if(!s||!t)return;
    const dist=Math.hypot(t.x-s.x,t.y-s.y), ms=Math.min(600,Math.max(200,dist*1.6));
    if(!G)return;
    G.append('circle').attr('r',4).attr('fill',s.color||PAL[0]).attr('opacity',.95)
      .attr('cx',s.x).attr('cy',s.y).attr('pointer-events','none')
      .transition().duration(ms).ease(d3.easeLinear).attr('cx',t.x).attr('cy',t.y).attr('r',2.5)
      .transition().duration(120).attr('r',0).attr('opacity',0).remove();
    d3.selectAll('.eline').filter(d=>d.id===eid)
      .transition().duration(ms*.3).attr('stroke-opacity',.85).attr('stroke-width',3)
      .transition().duration(ms*.9).attr('stroke-opacity',.5).attr('stroke-width',2);
  },delay);
}
function propagate(startId){
  const vis=new Set([startId]), q=[{id:startId,depth:0,delay:0}];
  glowNode(startId,.9,0);
  while(q.length){
    const {id,depth,delay}=q.shift();
    edges.filter(e=>e.src===id||e.tgt===id).forEach((ed,i)=>{
      const tid=ed.src===id?ed.tgt:ed.src; if(vis.has(tid))return; vis.add(tid);
      const s=nodes.find(n=>n.id===id), t=nodes.find(n=>n.id===tid);
      const dist=s&&t?Math.hypot(t.x-s.x,t.y-s.y):100;
      const ms=Math.min(600,Math.max(200,dist*1.6));
      const d0=delay+i*50; pulseEdge(ed.id,d0);
      const d1=d0+ms; glowNode(tid,Math.max(.1,.8-depth*.16),d1);
      q.push({id:tid,depth:depth+1,delay:d1+50});
    });
  }
}

/* ════════════════════════════════════════
   GRADIENT DEFS
════════════════════════════════════════ */
let defsEl=null;
function rebuildGradients(){
  if(!defsEl) return;
  d3.select(defsEl).selectAll('.eg').remove();
  edges.forEach(ed=>{
    const sn=nodes.find(n=>n.id===ed.src), tn=nodes.find(n=>n.id===ed.tgt);
    if(!sn||!tn)return;
    const g=d3.select(defsEl).append('linearGradient')
      .attr('class','eg').attr('id','eg-'+ed.id)
      .attr('gradientUnits','userSpaceOnUse')
      .attr('x1',sn.x).attr('y1',sn.y).attr('x2',tn.x).attr('y2',tn.y);
    g.append('stop').attr('offset','0%').attr('stop-color',sn.color||PAL[0]);
    g.append('stop').attr('offset','100%').attr('stop-color',tn.color||PAL[0]);
  });
}
function updateGradientCoords(){
  edges.forEach(ed=>{
    const sn=nodes.find(n=>n.id===ed.src), tn=nodes.find(n=>n.id===ed.tgt);
    if(!sn||!tn)return;
    d3.select('#eg-'+ed.id)
      .attr('x1',sn.x).attr('y1',sn.y).attr('x2',tn.x).attr('y2',tn.y);
  });
}

/* ════════════════════════════════════════
   EDGE UPDATE (DOMを再作成せず属性だけ変更)
════════════════════════════════════════ */
let edgeG=null, nodeG=null;

function updateEdgeDOM(){
  if(!edgeG)return;
  // データ結合
  const sel=edgeG.selectAll('line.eline').data(edges,d=>d.id);
  // 新しいエッジを追加
  sel.enter().append('line').attr('class','eline')
    .attr('stroke',d=>'url(#eg-'+d.id+')')
    .attr('stroke-width',2).attr('stroke-opacity',.5)
    .attr('pointer-events','stroke').style('cursor','pointer')
    .on('click',(ev,d)=>{
      ev.stopPropagation();
      const sn=nodes.find(n=>n.id===d.src),tn=nodes.find(n=>n.id===d.tgt);
      if(confirm(`「${sn?.title}」↔「${tn?.title}」の接続を削除？`)){
        edges=edges.filter(e=>e.id!==d.id);
        save(); rebuildGradients(); updateEdgeDOM(); updateEdgePositions();
        refreshNodeSizes(); toast('🔗 解除しました');
      }
    });
  // 不要なエッジを削除
  sel.exit().remove();
  updateEdgePositions();
}

function updateEdgePositions(){
  if(!edgeG)return;
  edgeG.selectAll('line.eline')
    .attr('x1',d=>nodes.find(n=>n.id===d.src)?.x||0)
    .attr('y1',d=>nodes.find(n=>n.id===d.src)?.y||0)
    .attr('x2',d=>nodes.find(n=>n.id===d.tgt)?.x||0)
    .attr('y2',d=>nodes.find(n=>n.id===d.tgt)?.y||0);
  updateGradientCoords();
}

/* ════════════════════════════════════════
   NODE SIZE REFRESH (DOM再作成なし)
════════════════════════════════════════ */
function refreshNodeSizes(){
  if(!nodeG)return;
  nodeG.selectAll('g.nd').each(function(d){
    const r=nodeR(d.id);
    const el=d3.select(this);
    el.select('.glo').attr('r',r*1.85);
    el.select('.core').attr('r',r);
    el.select('.rim').attr('r',r+4.5);
    el.select('.hit').attr('r',r+16);
    el.select('.ico').attr('font-size',r*.5);
    el.select('.ico-done').attr('font-size',r*.6);
    el.select('.lbl').attr('y',r+14);
    el.select('.rpd').attr('cx',r*.72).attr('cy',-r*.72);
  });
}

/* ════════════════════════════════════════
   FLOAT ANIMATION (rAFループ — DOMに直接transform)
════════════════════════════════════════ */
function startFloat(){
  if(floatRaf){cancelAnimationFrame(floatRaf);floatRaf=null;}
  function loop(){
    floatT+=.009;
    if(nodeG){
      nodeG.selectAll('g.nd').each(function(d){
        if(d._dragging)return;
        if(!d._fp){d._fp=Math.random()*Math.PI*2;d._fs=.5+Math.random()*.7;d._fx=(Math.random()-.5)*1.5;}
        const dy=Math.sin(floatT*d._fs+d._fp)*2.2;
        const dx=Math.cos(floatT*d._fs*.65+d._fp)*d._fx;
        // ベース座標+ゆらぎ offset
        d3.select(this).attr('transform',`translate(${d.x+dx},${d.y+dy})`);
      });
    }
    floatRaf=requestAnimationFrame(loop);
  }
  loop();
}

/* ════════════════════════════════════════
   FULL GRAPH BUILD (初回 or resize のみ)
════════════════════════════════════════ */
function buildGraph(){
  const cont=document.getElementById('cvs');
  W=cont.clientWidth; H=cont.clientHeight;
  if(starRaf){cancelAnimationFrame(starRaf);starRaf=null;}
  if(floatRaf){cancelAnimationFrame(floatRaf);floatRaf=null;}

  SVG=d3.select('#g').attr('viewBox',`0 0 ${W} ${H}`);
  SVG.selectAll('*').remove();
  buildStars(SVG);

  // defs
  defsEl=SVG.append('defs').node();

  G=SVG.append('g');

  // zoom（慣性つき）
  ZOOM=d3.zoom().scaleExtent([.05,8]).on('zoom',e=>{
    G.attr('transform',e.transform);
    CZ=e.transform; curScale=e.transform.k;
    // ラベルサイズ維持
    d3.selectAll('.lbl').attr('font-size',Math.round(12/curScale));
  });
  SVG.call(ZOOM);

  // 慣性スクロール
  {
    let vx=0,vy=0,lastX=0,lastY=0,lastT=0,panning=false,iraf=null;
    function stopI(){if(iraf){cancelAnimationFrame(iraf);iraf=null;}}
    function runI(){
      stopI();
      (function step(){
        if(Math.abs(vx)<.15&&Math.abs(vy)<.15)return;
        vx*=.90;vy*=.90;
        const t=CZ.translate(vx,vy);
        SVG.call(ZOOM.transform,t);
        iraf=requestAnimationFrame(step);
      })();
    }
    const el=document.getElementById('g');
    el.addEventListener('pointerdown',e=>{
      if(e.pointerType!=='mouse'&&e.target.tagName==='svg'){
        stopI();panning=true;lastX=e.clientX;lastY=e.clientY;lastT=Date.now();vx=0;vy=0;
      }
    },{passive:true});
    el.addEventListener('pointermove',e=>{
      if(!panning)return;
      const dt=Math.max(1,Date.now()-lastT);
      vx=(e.clientX-lastX)/dt*16;vy=(e.clientY-lastY)/dt*16;
      lastX=e.clientX;lastY=e.clientY;lastT=Date.now();
    },{passive:true});
    el.addEventListener('pointerup',()=>{if(panning){panning=false;runI();}},{passive:true});
    el.addEventListener('pointercancel',()=>{panning=false;},{passive:true});
  }

  // 背景クリック
  SVG.on('click.bg',e=>{
    if(document.getElementById('sb').classList.contains('open')){closeSB();return;}
    const [cx,cy]=d3.pointer(e,SVG.node());
    const [gx,gy]=CZ.invert([cx,cy]);
    showAddPop(gx,gy,cx,cy+50);
  });

  // レイヤー
  edgeG=G.append('g').attr('class','eLayer');
  nodeG=G.append('g').attr('class','nLayer');

  // 初期z付与
  nodes.forEach(n=>{if(n.z===undefined)n.z=(Math.random()-.5)*400;});

  rebuildGradients();
  buildNodes();
  updateEdgeDOM();
  startFloat();
}

/* ════════════════════════════════════════
   BUILD NODES (初回 or clear後)
════════════════════════════════════════ */
function buildNodes(){
  if(!nodeG)return;
  nodeG.selectAll('g.nd').remove();

  const sorted=[...nodes].sort((a,b)=>(a.z||0)-(b.z||0));
  const grp=nodeG.selectAll('g.nd').data(sorted,d=>d.id).enter()
    .append('g').attr('class',d=>`nd${d.done?' done':''}${selId===d.id?' sel':''}`)
    .attr('transform',d=>`translate(${d.x},${d.y})`);

  attachDrag(grp);
  attachClick(grp);
  drawNodeShapes(grp);
}

/* ════════════════════════════════════════
   NODE SHAPES
════════════════════════════════════════ */
function drawNodeShapes(grp){
  const zB=d=>.5+.4*((d.z||0)+300)/600;
  grp.append('circle').attr('class','glo').attr('r',d=>nodeR(d.id)*1.85)
    .attr('fill',d=>d.color||PAL[0]).attr('fill-opacity',d=>zB(d)*.1).attr('pointer-events','none');
  grp.append('circle').attr('class','core').attr('r',d=>nodeR(d.id))
    .attr('fill',d=>d.color||PAL[0]).attr('fill-opacity',d=>zB(d));
  grp.append('circle').attr('class','rim').attr('r',d=>nodeR(d.id)+4.5)
    .attr('fill','none').attr('stroke',d=>d.color||PAL[0]).attr('stroke-width',1.2)
    .attr('opacity',.35).attr('pointer-events','none');
  // 透明ヒット
  grp.append('circle').attr('class','hit').attr('fill','transparent')
    .attr('r',d=>hitR(d.id));
  // アイコン
  grp.append('text').attr('class','ico').attr('dominant-baseline','middle').attr('text-anchor','middle')
    .attr('y',.5).attr('font-size',d=>nodeR(d.id)*.5).attr('fill','#fff').attr('fill-opacity',.65)
    .attr('pointer-events','none')
    .text(d=>d.done&&d.type==='todo'?'':TICON[d.type]||'📝');
  grp.filter(d=>d.done&&d.type==='todo').append('text').attr('class','ico-done')
    .attr('dominant-baseline','middle').attr('text-anchor','middle')
    .attr('y',.5).attr('font-size',d=>nodeR(d.id)*.6).attr('fill','#4ade80')
    .attr('pointer-events','none').text('✓');
  // ラベル
  grp.append('text').attr('class','lbl').attr('text-anchor','middle')
    .attr('y',d=>nodeR(d.id)+14).attr('font-size',Math.round(12/curScale))
    .attr('fill',d=>d.color||PAL[0]).attr('pointer-events','none')
    .text(d=>d.title.length>14?d.title.slice(0,14)+'…':d.title);
  // リマインダードット
  grp.append('circle').attr('class','rpd')
    .attr('cx',d=>nodeR(d.id)*.72).attr('cy',d=>-nodeR(d.id)*.72)
    .attr('r',4.5).attr('fill','#f9a8d4').attr('pointer-events','none')
    .attr('opacity',d=>d.remind&&d.remind.length?1:0)
    .classed('rpulse',d=>!!(d.remind&&d.remind.length));
}

/* ════════════════════════════════════════
   DRAG — 常に指の下、接続も指の下で
════════════════════════════════════════ */
function attachDrag(sel){
  sel.call(
    d3.drag()
      // subject: 現在のグラフ座標をそのまま使う（d.x,d.y）
      .subject(function(ev,d){return {x:d.x,y:d.y};})
      .on('start',function(ev,d){
        ev.sourceEvent?.stopPropagation?.();
        d._dragging=true; d._mv=false;
        d._lastSnap=null; d._snapId=null; d._unsnapId=null;
        // ドラッグ中はfloatを止め、正確な位置に固定
        d3.select(this).attr('transform',`translate(${d.x},${d.y})`).raise();
      })
      .on('drag',function(ev,d){
        d._mv=true;
        // ev.x,ev.y はsubjectを基準としたグラフ座標で正確
        d.x=ev.x; d.y=ev.y;
        d3.select(this).attr('transform',`translate(${d.x},${d.y})`);
        updateEdgePositions();
        updateGradientCoords();

        // スナップ判定を先に行う（隣接ノードの移動前座標で判定）
        const r=nodeR(d.id);
        // 接続済みノードはスナップ判定から除外（トグル誤動作を防ぐ）
        const connectedIds=new Set(edges.filter(e=>e.src===d.id||e.tgt===d.id)
          .map(e=>e.src===d.id?e.tgt:e.src));
        const snap=nodes.find(n=>{
          if(n.id===d.id||connectedIds.has(n.id))return false;
          return Math.hypot(n.x-d.x,n.y-d.y)<r+nodeR(n.id)+10;
        });

        // 接続済み隣接ノードをじわっと動かす（移動量の4%だけ追随）
        connectedIds.forEach(cid=>{
          const nb=nodes.find(n=>n.id===cid); if(!nb)return;
          nb.x+=ev.dx*0.04; nb.y+=ev.dy*0.04;
          nodeG.selectAll('g.nd').filter(n=>n.id===cid)
            .attr('transform',`translate(${nb.x},${nb.y})`);
        });
        nodeG.selectAll('g.nd').each(function(n){
          const isSnap=snap&&n.id===snap.id;
          d3.select(this).select('.core')
            .attr('stroke',isSnap?'#fff':null)
            .attr('stroke-width',isSnap?2.5:null);
          d3.select(this).select('.rim').attr('opacity',isSnap?1:.35);
        });

        // 新規接続: 未接続ノードに重ねる
        if(snap){
          if(snap.id!==d._snapId){
            d._snapId=snap.id;
            edges.push({id:'e'+Date.now(),src:d.id,tgt:snap.id});
            save(); rebuildGradients(); updateEdgeDOM(); refreshNodeSizes();
            propagate(d.id); toast('🔗 接続しました');
          }
        } else {
          d._snapId=null;
        }

        // 解除: 接続済みノードに重ねる（別判定）
        const unsnap=nodes.find(n=>{
          if(n.id===d.id||!connectedIds.has(n.id))return false;
          return Math.hypot(n.x-d.x,n.y-d.y)<r+nodeR(n.id)+10;
        });
        if(unsnap){
          if(unsnap.id!==d._unsnapId){
            d._unsnapId=unsnap.id;
            const ed=edges.find(e=>(e.src===d.id&&e.tgt===unsnap.id)||(e.src===unsnap.id&&e.tgt===d.id));
            if(ed){
              edges=edges.filter(e=>e.id!==ed.id);
              save(); rebuildGradients(); updateEdgeDOM(); refreshNodeSizes();
              toast('🔗 解除しました');
            }
          }
        } else {
          d._unsnapId=null;
        }
      })
      .on('end',function(ev,d){
        d._dragging=false; d._snapId=null;
        nodeG.selectAll('g.nd').each(function(n){
          d3.select(this).select('.core').attr('stroke',null).attr('stroke-width',null);
          d3.select(this).select('.rim').attr('opacity',.35);
        });
        if(d._mv){save();updateEdgePositions();}
      })
  );
}

/* ════════════════════════════════════════
   CLICK
════════════════════════════════════════ */
function attachClick(sel){
  sel.on('click',function(ev,d){
    ev.stopPropagation();
    if(d._mv){d._mv=false;return;}
    selId=d.id; propagate(d.id);
    if(!document.getElementById('sb').classList.contains('open')){
      setTimeout(()=>{if(selId===d.id)openSB(d);},300);
    } else {openSB(d);}
  });
}

/* ════════════════════════════════════════
   ADD NODE
════════════════════════════════════════ */
function activateAdd(){const p=scatterPos();showAddPop(p.x,p.y,W/2,H/2+50);}
function showAddPop(gx,gy,sx,sy){
  addGxy={x:gx,y:gy};
  const p=document.getElementById('addpop');
  p.style.display='block';
  p.style.left=Math.min(sx,innerWidth-255)+'px';
  p.style.top=Math.min(sy+50,innerHeight-100)+'px';
  document.getElementById('add-in').value='';
  setTimeout(()=>document.getElementById('add-in').focus(),50);
}
function cancelAdd(){document.getElementById('addpop').style.display='none';}
function confirmAdd(){
  const title=document.getElementById('add-in').value.trim(); if(!title)return;
  const col=PAL[nodes.length%PAL.length];
  const nd={id:'n'+Date.now(),title,body:'',type:'memo',done:false,
    color:col,z:(Math.random()-.5)*400,x:addGxy.x,y:addGxy.y,remind:[]};
  nodes.push(nd);
  // DOMに1ノード追加
  const sorted=[...nodes].sort((a,b)=>(a.z||0)-(b.z||0));
  const existing=nodeG.selectAll('g.nd').data(sorted,d=>d.id);
  const entered=existing.enter().append('g')
    .attr('class','nd').attr('transform',`translate(${nd.x},${nd.y})`);
  attachDrag(entered); attachClick(entered); drawNodeShapes(entered);
  save(); cancelAdd(); toast('✦ 追加しました');
  setTimeout(()=>{selId=nd.id;openSB(nd);},300);
}
document.getElementById('add-in').addEventListener('keydown',e=>{if(e.key==='Enter')confirmAdd();if(e.key==='Escape')cancelAdd();});
document.getElementById('addpop').addEventListener('click',e=>e.stopPropagation());

/* ════════════════════════════════════════
   SIDEBAR
════════════════════════════════════════ */
function openSB(d){
  selId=d.id;
  document.getElementById('sb').classList.add('open');
  document.getElementById('sdot').style.background=d.color||PAL[0];
  document.getElementById('sb-ttl').value=d.title;
  document.getElementById('sb-body').value=d.body||'';
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.toggle('on',b.dataset.type===d.type));
  const db=document.getElementById('sb-done');
  db.textContent=d.done?'✓ 完了済み':'完了にする'; db.className=d.done?'done':'';
  const cr=document.getElementById('cprow'); cr.innerHTML='';
  PAL.forEach(c=>{
    const el=document.createElement('div'); el.className='cp'+(c===d.color?' on':'');
    el.style.background=c;
    el.onclick=()=>{applyColor(c);cr.querySelectorAll('.cp').forEach(x=>x.classList.remove('on'));el.classList.add('on');};
    cr.appendChild(el);
  });
  renderReminds(d); renderConns(d);
}
function _doSave(){
  if(!selId)return;
  const nd=nodes.find(n=>n.id===selId); if(!nd)return;
  const newTitle=document.getElementById('sb-ttl').value.trim();
  if(newTitle) nd.title=newTitle;
  nd.body=document.getElementById('sb-body').value;
  save();
  // ラベル更新（DOM再構築なし）
  nodeG.selectAll('g.nd').filter(n=>n.id===selId)
    .select('.lbl').text(nd.title.length>14?nd.title.slice(0,14)+'…':nd.title);
}
function closeSB(){
  _doSave(); selId=null;
  document.getElementById('sb').classList.remove('open');
  nodeG&&nodeG.selectAll('g.nd').classed('sel',false);
}
function saveSB(){
  _doSave(); selId=null;
  document.getElementById('sb').classList.remove('open');
  nodeG&&nodeG.selectAll('g.nd').classed('sel',false);
  toast('💾 保存しました');
}
function setType(t){
  if(!selId)return;
  const nd=nodes.find(n=>n.id===selId); if(!nd)return;
  nd.type=t; save();
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.toggle('on',b.dataset.type===t));
  nodeG.selectAll('g.nd').filter(n=>n.id===selId).select('.ico')
    .text(nd.done&&t==='todo'?'':TICON[t]||'📝');
}
function toggleDone(){
  if(!selId)return;
  const nd=nodes.find(n=>n.id===selId); if(!nd)return;
  nd.done=!nd.done; save(); openSB(nd);
  nodeG.selectAll('g.nd').filter(n=>n.id===selId).classed('done',nd.done);
}
function applyColor(col){
  if(!selId)return;
  const nd=nodes.find(n=>n.id===selId); if(!nd)return;
  nd.color=col; document.getElementById('sdot').style.background=col; save();
  const el=nodeG.selectAll('g.nd').filter(n=>n.id===selId);
  el.select('.core').attr('fill',col);
  el.select('.glo').attr('fill',col);
  el.select('.rim').attr('stroke',col);
  el.select('.lbl').attr('fill',col);
  rebuildGradients(); updateEdgeDOM();
}
function delNode(){
  if(!selId)return;
  if(!confirm('このノードを削除しますか？'))return;
  nodeG.selectAll('g.nd').filter(n=>n.id===selId).remove();
  nodes=nodes.filter(n=>n.id!==selId);
  edges=edges.filter(e=>e.src!==selId&&e.tgt!==selId);
  save(); selId=null;
  document.getElementById('sb').classList.remove('open');
  rebuildGradients(); updateEdgeDOM(); refreshNodeSizes();
  toast('🗑 削除しました');
}

/* ════════════════════════════════════════
   REMINDER
════════════════════════════════════════ */
function addReminder(){
  if(!selId)return;
  const date=document.getElementById('sb-rdate').value;
  const time=document.getElementById('sb-rtime').value;
  if(!date||!time){toast('日付と時刻を選んでください');return;}
  const dtStr=date+'T'+time;
  const nd=nodes.find(n=>n.id===selId); if(!nd)return;
  if(!nd.remind)nd.remind=[];
  nd.remind.push(dtStr); save(); renderReminds(nd);
  schedReminder(nd.id,dtStr,nd.title); toast('🔔 セットしました');
}
function removeReminder(nid,idx){
  const nd=nodes.find(n=>n.id===nid); if(!nd)return;
  nd.remind.splice(idx,1); save(); renderReminds(nd);
}
function renderReminds(nd){
  const el=document.getElementById('rlist'); el.innerHTML='';
  (nd.remind||[]).forEach((r,i)=>{
    const d=new Date(r);
    const s=d.toLocaleDateString('ja')+' '+d.toLocaleTimeString('ja',{hour:'2-digit',minute:'2-digit'});
    const tag=document.createElement('div'); tag.className='rtag';
    tag.innerHTML=`🔔 ${s}<button onclick="removeReminder('${nd.id}',${i})">×</button>`;
    el.appendChild(tag);
  });
}
function schedReminder(nid,dtStr,title){
  const ms=new Date(dtStr).getTime()-Date.now(); if(ms<=0)return;
  setTimeout(()=>{
    toast(`🔔 ${title}`); glowNode(nid,1,0);
    if('Notification' in window&&Notification.permission==='granted')
      new Notification('✦ Constellation',{body:title});
  },ms);
}

/* ════════════════════════════════════════
   CONNECTIONS
════════════════════════════════════════ */
function renderConns(nd){
  const el=document.getElementById('clist'); el.innerHTML='';
  const adj=edges.filter(e=>e.src===nd.id||e.tgt===nd.id);
  if(!adj.length){el.innerHTML='<div style="font-size:11px;color:var(--dim)">接続なし</div>';return;}
  adj.forEach(ed=>{
    const tid=ed.src===nd.id?ed.tgt:ed.src;
    const tn=nodes.find(n=>n.id===tid); if(!tn)return;
    const item=document.createElement('div'); item.className='ci';
    item.innerHTML=`<span style="color:${tn.color}">${TICON[tn.type]||'📝'}</span>
      <span style="flex:1;margin:0 6px">${tn.title}</span>
      <button onclick="event.stopPropagation();removeEdge('${ed.id}')">×</button>`;
    item.onclick=(e)=>{if(e.target.tagName==='BUTTON')return;selId=tn.id;openSB(tn);propagate(tn.id);};
    el.appendChild(item);
  });
}
function removeEdge(eid){
  edges=edges.filter(e=>e.id!==eid); save();
  rebuildGradients(); updateEdgeDOM(); refreshNodeSizes();
  const nd=nodes.find(n=>n.id===selId); if(nd)renderConns(nd);
  toast('🔗 解除しました');
}

/* ════════════════════════════════════════
   EXPORT / IMPORT
════════════════════════════════════════ */
function exportAll(){
  let md='# ✦ Constellation\n\n> '+new Date().toLocaleString('ja')+'\n\n---\n\n';
  nodes.forEach(nd=>{
    md+=`## ${TICON[nd.type]||'📝'} ${nd.title}${nd.done?' ✓':''}\n\n`;
    md+=`- **種別**: ${nd.type}\n- **座標**: (${Math.round(nd.x)},${Math.round(nd.y)})\n`;
    if(nd.remind?.length)md+=`- **リマインダー**: ${nd.remind.join(', ')}\n`;
    if(nd.body)md+=`\n${nd.body}\n`;
    const c=edges.filter(e=>e.src===nd.id||e.tgt===nd.id)
      .map(e=>nodes.find(n=>n.id===(e.src===nd.id?e.tgt:e.src))?.title||'').filter(Boolean);
    if(c.length)md+=`\n**接続**: ${c.join(', ')}\n`;
    md+='\n---\n\n';
  });
  dlText(md,'constellation_'+Date.now()+'.md'); toast('📄 エクスポートしました');
}
function dlNodeMD(){
  if(!selId)return;
  const nd=nodes.find(n=>n.id===selId); if(!nd)return;
  let md=`# ${TICON[nd.type]||'📝'} ${nd.title}\n\n- **種別**: ${nd.type}\n- **完了**: ${nd.done?'✓':'未'}\n`;
  if(nd.remind?.length)md+=`- **リマインダー**: ${nd.remind.join(', ')}\n`;
  if(nd.body)md+=`\n${nd.body}\n`;
  dlText(md,nd.title.replace(/[^\wぁ-ん一-龥]/g,'_')+'.md');
}
function dlText(t,n){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([t],{type:'text/markdown'}));a.download=n;a.click();}
function onImport(ev){
  const file=ev.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split('\n'); let ci=0;
    lines.forEach(line=>{
      const m=line.match(/^##\s+(.+)/); if(!m)return;
      const raw=m[1].replace(/[📝☑💡🎯🔗✓\s]+$/,'').trim();
      if(!raw||nodes.find(n=>n.title===raw))return;
      const pos=scatterPos();
      nodes.push({id:'n'+Date.now()+Math.random(),title:raw,body:'',type:'memo',
        done:false,color:PAL[ci%PAL.length],z:(Math.random()-.5)*400,x:pos.x,y:pos.y,remind:[]});
      ci++;
    });
    save(); buildNodes(); rebuildGradients(); updateEdgeDOM(); toast('📥 インポートしました');
  };
  reader.readAsText(file); ev.target.value='';
}
function clearAll(){
  if(!confirm('全て削除しますか？'))return;
  nodes=[]; edges=[]; save();
  document.getElementById('sb').classList.remove('open'); selId=null;
  nodeG&&nodeG.selectAll('g.nd').remove();
  rebuildGradients(); updateEdgeDOM(); toast('🗑 全消去しました');
}

/* ════════════════════════════════════════
   TOAST
════════════════════════════════════════ */
let _tt=null;
function toast(msg){
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('up');
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('up'),2200);
}

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
load();
nodes.forEach(n=>{if(n.z===undefined)n.z=(Math.random()-.5)*400;});
buildGraph();
nodes.forEach(nd=>(nd.remind||[]).forEach(r=>schedReminder(nd.id,r,nd.title)));
if('Notification' in window&&Notification.permission==='default')Notification.requestPermission();
window.addEventListener('resize',buildGraph);
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){cancelAdd();if(document.getElementById('sb').classList.contains('open'))closeSB();}
});
</script>
